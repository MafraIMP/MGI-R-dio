<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M.G.I // NEXUS DE COMUNICAÇÃO SUPREMO - V2</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-deep: #020203;
            --grid-line: rgba(75, 0, 130, 0.1);
            --mafra: #b026ff;
            --vermelho: #ff1a1a;
            --amarelo: #ffcc00;
            --purpura: #8a2be2; 
            --cinza: #a0a0a0;
            --text-main: #f0f0f0;
            --panel-bg: rgba(5, 5, 8, 0.95);
            --danger: #ff003c;
            --success: #00ff55;
            --font-ui: 'Space Mono', monospace;
            --font-display: 'Rajdhani', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body {
            background-color: var(--bg-deep);
            background-image: 
                linear-gradient(var(--grid-line) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
            background-size: 50px 50px;
            color: var(--text-main);
            font-family: var(--font-display);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: var(--panel-bg); border: 1px solid var(--mafra);
            padding: 40px; width: 450px; box-shadow: 0 0 50px rgba(176, 38, 255, 0.15);
            border-radius: 4px; position: relative; overflow: hidden;
        }
        .login-box::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, transparent, var(--mafra), transparent);
        }
        .login-box h1 { font-family: var(--font-ui); color: var(--mafra); text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-family: var(--font-ui); font-size: 0.8rem; color: #777; margin-bottom: 8px; text-transform: uppercase; }
        .input-group input, .input-group select {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.5); border: 1px solid #333;
            color: #fff; font-family: var(--font-ui); outline: none; transition: 0.3s;
        }
        .input-group input[type="file"] { padding: 8px; font-size: 0.8rem; cursor: pointer; }
        .input-group input:focus, .input-group select:focus { border-color: var(--mafra); box-shadow: inset 0 0 10px rgba(176,38,255,0.2); }
        
        .btn-login {
            width: 100%; padding: 15px; background: transparent; border: 1px solid var(--mafra);
            color: var(--mafra); font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: all 0.3s; font-family: var(--font-ui); font-size: 1rem; letter-spacing: 1px;
            margin-top: 10px;
        }
        .btn-login:hover { background: var(--mafra); color: #fff; box-shadow: 0 0 30px rgba(176,38,255,0.4); }

        /* PAINEL DE STATUS GERAL */
        #status-panel {
            display: none; /* Oculto por padrão, revela ao logar */
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--panel-bg);
            border: 1px solid var(--mafra);
            box-shadow: 0 0 20px rgba(176,38,255,0.2);
            padding: 15px 25px;
            z-index: 1000;
            text-align: right;
            border-radius: 4px;
            pointer-events: none;
        }
        .status-title {
            font-family: var(--font-ui);
            font-size: 0.7rem;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .status-current {
            font-family: var(--font-display);
            font-size: 1.6rem;
            color: var(--mafra);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(176,38,255,0.5);
            text-transform: uppercase;
            transition: color 0.3s, text-shadow 0.3s;
        }
        .status-danger {
            color: var(--danger) !important;
            text-shadow: 0 0 15px var(--danger) !important;
        }

        #map-container { display: none; flex: 1; overflow: auto; padding: 40px; }
        .topology-wrapper { display: flex; flex-direction: column; align-items: center; min-width: 1400px; padding-bottom: 120px; }
        
        .connector-line { width: 2px; background: rgba(255,255,255,0.1); margin: 0 auto; transition: all 0.3s; }
        .connector-horizontal { height: 2px; background: rgba(255,255,255,0.1); width: 85%; margin: 0 auto; }

        .node-wrapper { display: flex; flex-direction: column; align-items: center; position: relative; }
        
        .node {
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            background-size: cover; background-position: center; position: relative;
            cursor: pointer; border: 2px solid #333; background-color: #0a0a0a;
            transition: all 0.1s; 
            z-index: 10;
        }
        .node-name {
            margin-top: 12px; font-family: var(--font-ui); font-size: 0.75rem; color: #888;
            background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 4px; border: 1px solid #222;
            white-space: nowrap; transition: color 0.3s;
        }

        .node.mic-open { border-color: currentColor; box-shadow: 0 0 25px currentColor; transform: scale(1.1); }
        .node.mic-open::before {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%; border: 1px solid currentColor; animation: pulse-ring 1s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        }
        @keyframes pulse-ring { 0% { transform: scale(0.95); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }

        .node.muted-attn { filter: grayscale(100%); opacity: 0.5; border-color: var(--mafra) !important; }
        .node.muted-attn::after { content: '\f023'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--mafra); position: absolute; font-size: 1.5rem; text-shadow: 0 0 10px #000; }
        .node.banned { border-color: var(--danger) !important; opacity: 0.4; filter: grayscale(80%); }
        .node.banned::after { content: '\f05e'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: var(--danger); position: absolute; font-size: 1.5rem; text-shadow: 0 0 10px #000; }
        .node.self-muted::after { content: '\f131'; font-family: 'Font Awesome 6 Free'; font-weight: 900; color: #ff003c; position: absolute; font-size: 1.5rem; text-shadow: 0 0 10px #000; }

        .tier-mafra .node { width: 100px; height: 100px; border-color: var(--mafra); color: var(--mafra); box-shadow: inset 0 0 20px rgba(176,38,255,0.2); }
        .tier-mafra .node-name { color: var(--mafra); border-color: var(--mafra); font-size: 0.9rem; font-weight: bold; }
        
        .tier-lider .node { width: 80px; height: 80px; }
        .tier-membros .node { width: 60px; height: 60px; }

        .divisions-container { display: flex; justify-content: space-around; width: 100%; margin-top: -1px; }
        .division { display: flex; flex-direction: column; align-items: center; width: 25%; cursor: pointer; padding: 15px; border: 1px solid transparent; border-radius: 6px; transition: all 0.3s; }
        .division.focused-target { border-color: var(--mafra); background: rgba(176, 38, 255, 0.05); box-shadow: 0 0 25px rgba(176, 38, 255, 0.15); }
        
        .div-vermelho { color: var(--vermelho); } .div-vermelho .connector-line { background: rgba(255,26,26,0.3); }
        .div-amarelo { color: var(--amarelo); } .div-amarelo .connector-line { background: rgba(255,204,0,0.3); }
        .div-purpura { color: var(--purpura); } .div-purpura .connector-line { background: rgba(138,43,226,0.3); }
        .div-cinza { color: var(--cinza); } .div-cinza .connector-line { background: rgba(160,160,160,0.3); }

        .grid-membros { display: flex; gap: 40px; margin-top: 20px; position: relative; }
        .coluna-esq, .coluna-dir { display: flex; flex-direction: column; gap: 20px; position: relative; }
        .grid-membros::before { content:''; position:absolute; left:50%; top:0; bottom:0; width:1px; background: rgba(255,255,255,0.1); transform: translateX(-50%); }

        .node.ghost { background: transparent; border: 1px dashed #444; color: #444; cursor: default; box-shadow: none; }
        .node.ghost::before { display: none; }

        #bottom-hud {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 110px;
            background: #050505; border-top: 1px solid #222; display: flex;
            justify-content: space-between; align-items: center; padding: 0 40px; z-index: 500;
        }
        .hud-profile { display: flex; align-items: center; gap: 20px; width: 300px; }
        .hud-avatar { width: 70px; height: 70px; border-radius: 50%; border: 2px solid; background-size: cover; background-position: center; }
        .hud-info h2 { font-size: 1.4rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
        .hud-info p { font-family: var(--font-ui); font-size: 0.75rem; color: #888; }
        
        .hud-controls { flex: 1; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 10px; }
        
        .comms-status { font-family: var(--font-ui); font-size: 0.85rem; color: #aaa; text-align: center; }
        .comms-highlight { color: #fff; font-weight: bold; }

        .btn {
            padding: 10px 20px; border-radius: 4px; border: 1px solid currentColor; background: transparent;
            color: inherit; font-family: var(--font-ui); font-size: 0.9rem; font-weight: bold; cursor: pointer;
            transition: all 0.2s; letter-spacing: 1px; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn:active { transform: scale(0.97); }
        .btn.active-state { background: currentColor; color: #000; box-shadow: 0 0 20px currentColor; }

        #admin-panel {
            position: fixed; right: -400px; top: 0; width: 400px; height: 100%;
            background: var(--panel-bg); border-left: 1px solid var(--mafra);
            z-index: 2000; transition: right 0.3s ease; display: flex; flex-direction: column;
            box-shadow: -10px 0 30px rgba(0,0,0,0.8);
        }
        #admin-panel.open { right: 0; }
        .admin-header { padding: 20px; background: rgba(176,38,255,0.1); border-bottom: 1px solid var(--mafra); display: flex; justify-content: space-between; align-items: center; }
        .admin-header h2 { color: var(--mafra); font-family: var(--font-ui); font-size: 1.2rem; }
        .close-admin { color: #fff; cursor: pointer; font-size: 1.2rem; }
        
        .admin-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .user-row { background: #111; border: 1px solid #333; padding: 15px; border-radius: 4px; }
        .user-row-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .user-row-name { font-family: var(--font-ui); font-weight: bold; font-size: 1rem; color: #fff; }
        .user-actions { display: flex; flex-wrap: wrap; gap: 5px; }
        .action-btn { padding: 5px 10px; font-size: 0.7rem; font-family: var(--font-ui); cursor: pointer; background: #222; border: 1px solid #444; color: #aaa; border-radius: 3px; transition: 0.2s; }
        .action-btn:hover { background: #333; color: #fff; }
        .action-btn.ban:hover { background: var(--danger); border-color: var(--danger); }
        .action-btn.promote:hover { background: var(--success); border-color: var(--success); color: #000; }

        .admin-footer { padding: 20px; border-top: 1px solid #333; }
        
        .global-override-active { background: rgba(176,38,255,0.05); border: 8px solid var(--mafra); position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: none; }

        /* PAINEL DE CHAT TEXTO */
        #chat-panel {
            position: fixed; left: -400px; top: 0; width: 400px; height: 100%;
            background: var(--panel-bg); border-right: 1px solid var(--mafra);
            z-index: 2000; transition: left 0.3s ease; display: flex; flex-direction: column;
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
        }
        #chat-panel.open { left: 0; }
        .chat-header { padding: 20px; background: rgba(176,38,255,0.1); border-bottom: 1px solid var(--mafra); display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { color: var(--mafra); font-family: var(--font-ui); font-size: 1.1rem; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; font-family: var(--font-ui); font-size: 0.85rem; }
        .chat-msg { background: rgba(255,255,255,0.03); border-left: 3px solid #444; padding: 8px 12px; border-radius: 0 4px 4px 0; }
        .chat-msg-meta { font-weight: bold; margin-bottom: 3px; font-size: 0.75rem; }
        .chat-footer { padding: 15px; border-top: 1px solid #222; display: flex; gap: 10px; }
        .chat-input { flex: 1; background: #000; border: 1px solid #333; padding: 10px; color: #fff; font-family: var(--font-ui); outline: none; }
        .chat-input:focus { border-color: var(--mafra); }

        /* ESTILOS DO SLIDER DE FILTRO DE RUÍDO */
        .slider-container { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .slider-container input[type="range"] { -webkit-appearance: none; width: 120px; background: transparent; }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; height: 14px; width: 14px; border-radius: 50%;
            background: var(--mafra); cursor: pointer; margin-top: -6px; box-shadow: 0 0 10px var(--mafra);
        }
        .slider-container input[type="range"]::-webkit-slider-runnable-track {
            width: 100%; height: 2px; cursor: pointer; background: #333; border-radius: 1px;
        }
    </style>
</head>
<body>

    <div class="global-override-active" id="global-override-ui"></div>

    <div id="login-overlay">
        <div class="login-box">
            <h1>M.G.I TERMINAL</h1>
            <div class="input-group">
                <label>Identificação de Agente</label>
                <input type="text" id="log-user" placeholder="Seu nome..." />
            </div>
            <div class="input-group">
                <label>Divisão Designada</label>
                <select id="log-div">
                    <option value="vermelho">Divisão Vermelha</option>
                    <option value="amarelo">Divisão Amarela</option>
                    <option value="purpura">Braço Púrpura (Alto Escalão)</option>
                    <option value="cinza">Divisão Cinza</option>
                </select>
            </div>
            <div class="input-group">
                <label>Código de Autorização Central</label>
                <input type="password" id="log-code" placeholder="MGI2026" />
            </div>
            <div class="input-group">
                <label>Avatar (Selecione da Galeria)</label>
                <input type="file" id="log-avatar" accept="image/*" />
            </div>
            <button class="btn-login" onclick="executarLogin()">Estabelecer Conexão</button>
            <p id="login-err" style="color:var(--danger); font-family:var(--font-ui); font-size:0.8rem; margin-top:15px; text-align:center; display:none;">ACESSO NEGADO. CHAVE INVÁLIDA.</p>
        </div>
    </div>

    <!-- PAINEL DE STATUS -->
    <div id="status-panel">
        <div class="status-title">STATUS DA MISSÃO</div>
        <div class="status-current" id="current-status-display">4-7 (Pacificação)</div>
    </div>

    <!-- ABAS LATERAIS -->
    <div id="chat-panel">
        <div class="chat-header">
            <h2><i class="fa-solid fa-comments"></i> COMUNICAÇÃO TEXTUAL (MUTADOS/GERAL)</h2>
            <i class="fa-solid fa-xmark close-admin" onclick="toggleChatPanel()"></i>
        </div>
        <div class="chat-body" id="chat-messages-container"></div>
        <div class="chat-footer">
            <input type="text" class="chat-input" id="chat-input-field" placeholder="Escreva uma mensagem..." onkeydown="if(event.key === 'Enter') sendTextMessage()" />
            <button class="btn" style="color: var(--mafra);" onclick="sendTextMessage()"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="admin-panel">
        <div class="admin-header">
            <h2><i class="fa-solid fa-chess-king"></i> COMANDO CENTRAL</h2>
            <i class="fa-solid fa-xmark close-admin" onclick="toggleAdminPanel()"></i>
        </div>
        <div class="admin-body">
            <!-- BLOCO DE STATUS GERAL -->
            <div style="margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #333;">
                <label style="color:var(--mafra); font-family:var(--font-ui); font-size:0.8rem; display:block; margin-bottom:5px;">ALTERAR STATUS GLOBAL</label>
                <select id="status-selector" style="width:100%; background:#000; color:#fff; border:1px solid var(--mafra); padding:8px; font-family:var(--font-ui);" onchange="changeGlobalStatus(this.value)">
                    <optgroup label="Ações">
                        <option value="4-0 (Aniquilação)">4-0 (Aniquilação)</option>
                        <option value="4-1 (Extermínio)">4-1 (Extermínio)</option>
                        <option value="4-2 (Supressão)">4-2 (Supressão)</option>
                    </optgroup>
                    <optgroup label="Cenários">
                        <option value="4-3 (Contenção)">4-3 (Contenção)</option>
                        <option value="4-4 (Vigilância)">4-4 (Vigilância)</option>
                        <option value="4-5 (Intervenção)">4-5 (Intervenção)</option>
                        <option value="4-6 (Observação)">4-6 (Observação)</option>
                        <option value="4-7 (Pacificação)" selected>4-7 (Pacificação)</option>
                    </optgroup>
                </select>
            </div>
            <!-- LISTA DE USUÁRIOS -->
            <div id="admin-user-list"></div>
        </div>
        <div class="admin-footer">
            <button class="btn" id="btn-decentralize" style="width: 100%; justify-content: center; border-color: var(--success); color: var(--success);" onclick="toggleDecentralize()">
                <i class="fa-solid fa-earth-americas"></i> DESCENTRALIZAR REDE
            </button>
        </div>
    </div>

    <div id="map-container">
        <div class="topology-wrapper" id="topology-root"></div>
    </div>

    <div id="bottom-hud" style="display:none;">
        <div class="hud-profile">
            <div class="hud-avatar" id="hud-img"></div>
            <div class="hud-info">
                <h2 id="hud-name">USUÁRIO</h2>
                <p id="hud-role">CARGO | DIVISÃO</p>
            </div>
        </div>

        <div class="hud-controls" id="hud-controls-area">
            <div class="comms-status" id="comms-status-text">STATUS DA COMUNICAÇÃO</div>
            
            <div style="display: flex; gap: 15px;">
                <button class="btn" id="btn-toggle-chat" onclick="toggleChatPanel()" style="color: var(--cinza);">
                    <i class="fa-solid fa-comments"></i> <span>CHAT TEXTO</span>
                </button>

                <button class="btn" id="btn-mute-self" onclick="toggleSelfMute()" style="display:none;">
                    <i class="fa-solid fa-microphone"></i> <span>SILENCIAR</span>
                </button>

                <button class="btn" id="btn-ptt-lideres" onmousedown="startPTTLideres()" onmouseup="stopPTTLideres()" onmouseleave="stopPTTLideres()" style="display:none; color: var(--success); border-color: var(--success);">
                    <i class="fa-solid fa-radio"></i> PTT LÍDERES
                </button>

                <button class="btn" id="btn-call-lideres" onclick="toggleLeaderCall()" style="display:none; color: var(--amarelo); border-color: var(--amarelo);">
                    <i class="fa-solid fa-headset"></i> SALA COMANDO
                </button>

                <button class="btn" id="btn-ptt-mafra" onmousedown="startPTTMafra()" onmouseup="stopPTTMafra()" onmouseleave="stopPTTMafra()" style="display:none; color: var(--mafra);">
                    <i class="fa-solid fa-tower-broadcast"></i> OVERRIDE
                </button>
                
                <button class="btn" id="btn-open-admin" onclick="toggleAdminPanel()" style="display:none; color: var(--mafra);">
                    <i class="fa-solid fa-sliders"></i> PAINEL ADM
                </button>
            </div>
        </div>

        <!-- PAINEL VAD E CONTROLE DE RUÍDO -->
        <div style="width: 300px; text-align: right; display: flex; flex-direction: column; align-items: flex-end; justify-content: center;">
            <span style="font-family:var(--font-ui); font-size:0.75rem; color:#888;">VAD DETECT: <span id="vad-status" style="font-weight:bold;">OFF</span></span>
            <div class="slider-container">
                <span style="font-family:var(--font-ui); font-size:0.65rem; color:#666;">RUÍDO (<span id="noise-gate-val">15</span>)</span>
                <input type="range" id="noise-gate-slider" min="1" max="100" value="15">
            </div>
        </div>
    </div>

<script>
    // DO NOT INSPECT SECURITY
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.keyCode === 123 || 
            (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || 
            (e.ctrlKey && e.keyCode === 85)) {
            e.preventDefault();
            return false;
        }
    });

    // BAN CHECKER AT LOAD
    if (localStorage.getItem('mgi_banned_state') === 'true') {
        renderBannedScreen();
    }

    let currentUser = null;
    let systemUsers = []; 
    let activeLeaderPTTs = new Set();
    let remoteCandidatesQueue = {}; 
    
    let isDecentralized = false;
    let isSelfMuted = false;
    let isMafraOverrideActive = false;
    let activeMafraTargetDivision = null; 
    let localAvatarData = '';
    let inCommandRoom = false;
    let currentMGIStatus = "4-7 (Pacificação)";
    
    // Variável para o controle de limite de ruído (Noise Gate)
    let noiseThreshold = 15;

    const divisionColors = { vermelho: 'var(--vermelho)', amarelo: 'var(--amarelo)', purpura: 'var(--purpura)', cinza: 'var(--cinza)', roxo: 'var(--mafra)' };

    let socket;
    try {
        if (typeof io !== 'undefined') {
            socket = io();
        } else {
            throw new Error("Socket.io não encontrado na rede.");
        }
    } catch(e) {
        console.warn("[SISTEMA MGI]: Servidor não detectado. Simulando rede local.");
        socket = { emit: function(){}, on: function(){} };
    }

    let localStream = null;
    let peerConnections = {};
    let lastSpeakingState = false;
    const rtcConfig = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    // Atualização dinâmica do controle de Ruído
    document.getElementById('noise-gate-slider').addEventListener('input', function(e) {
        noiseThreshold = parseInt(e.target.value);

    // AUDIO CHIME GENERATOR
    function playSystemChime(type) {
        try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (!AudioContext) return;
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if (type === 'entry') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, ctx.currentTime); // D5
                osc.frequency.setValueAtTime(880, ctx.currentTime + 0.1); // A5
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            } else if (type === 'exit') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime); // A5
                osc.frequency.setValueAtTime(440, ctx.currentTime + 0.1); // A4
                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start(); osc.stop(ctx.currentTime + 0.3);
            }
        } catch(e){}
    }

    function playMetroAlertAndSpeak(statusString) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) {
            const ctx = new AudioContext();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            // Som de Metrô (Ding-Dong)
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, ctx.currentTime);
            osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.0);
            
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 1.0);
        }

        setTimeout(() => {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            
            const code = statusString.split(' ')[0];
            const utterance = new SpeechSynthesisUtterance(`Estatus da EME GÊ Í. Código ${code}.`);
            const voices = window.speechSynthesis.getVoices();
            
            let maleVoice = voices.find(v => v.lang.includes('pt') && (v.name.toLowerCase().includes('daniel') || v.name.toLowerCase().includes('google') || v.name.toLowerCase().includes('male')));
            if (!maleVoice) maleVoice = voices.find(v => v.lang.includes('pt'));
            
            if (maleVoice) utterance.voice = maleVoice;
            utterance.pitch = 0.1; 
            utterance.rate = 0.85; 
            
            window.speechSynthesis.speak(utterance);
        }, 1200); 
    }

    async function iniciarCapturaMicrofone() {
        try {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                throw new Error("Acesso negado às dependências de áudio do navegador.");
            }
            
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });
            localStream = stream;

            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const analyser = audioContext.createAnalyser();
            const microphone = audioContext.createMediaStreamSource(stream);
            
            microphone.connect(analyser);
            analyser.fftSize = 256;
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            function checarVolume() {
                requestAnimationFrame(checarVolume);
                if (!localStream) return;
                
                if (isSelfMuted || currentUser.status === 'banned') {
                    if (localStream.getAudioTracks().length > 0) localStream.getAudioTracks()[0].enabled = false;
                    document.getElementById('vad-status').innerText = 'MUTED';
                    document.getElementById('vad-status').style.color = 'red';
                    const node = document.getElementById(`node_${currentUser.id}`);
                    if(node) node.classList.remove('mic-open');
                    
                    if(lastSpeakingState !== false) {
                        lastSpeakingState = false;
                        socket.emit('voice-state', false);
                    }
                    return;
                } else {
                    if (localStream.getAudioTracks().length > 0) localStream.getAudioTracks()[0].enabled = true;
                }

                analyser.getByteFrequencyData(dataArray);
                let soma = 0;
                for (let i = 0; i < bufferLength; i++) { soma += dataArray[i]; }
                let mediaVolume = soma / bufferLength;

                const vadStatus = document.getElementById('vad-status');
                const myNode = document.getElementById(`node_${currentUser.id}`);

                // Sistema de filtro dinâmico: noiseThreshold substituindo valor estático de 15
                if (mediaVolume > noiseThreshold) {
                    vadStatus.innerText = 'ON'; vadStatus.style.color = 'var(--success)';
                    if(myNode) myNode.classList.add('mic-open');
                } else {
                    vadStatus.innerText = 'IDLE'; vadStatus.style.color = '#444';
                    if(myNode) myNode.classList.remove('mic-open');
                }

                let currentSpeaking = (mediaVolume > noiseThreshold);
                if (currentSpeaking !== lastSpeakingState) {
                    lastSpeakingState = currentSpeaking;
                    socket.emit('voice-state', currentSpeaking);
                }
            }
            checarVolume();
        } catch (err) {
            console.warn("[SISTEMA MGI] Falha física na captura do dispositivo:", err);
            const vadEl = document.getElementById('vad-status');
            if (vadEl) { vadEl.innerText = 'SEM MIC'; vadEl.style.color = 'orange'; }
        }
    }

    function enforceAudioRouting() {
        systemUsers.forEach(u => {
            if (u.id === currentUser.id || !u.socketId) return;
            const audioEl = document.getElementById(`audio_${u.socketId}`);
            
            if (audioEl) {
                if (currentUser.status === 'banned' || u.status === 'banned' || u.status === 'kicked') {
                    audioEl.muted = true; return;
                }
                
                if (isDecentralized) {
                    audioEl.muted = false; return;
                }

                // Lógica da Sala de Comando
                if (inCommandRoom) {
                    audioEl.muted = !(u.inCommandRoom === true);
                    return;
                }
                if (u.inCommandRoom) {
                    audioEl.muted = true;
                    return;
                }

                let canHear = false;

                if (isMafraOverrideActive) {
                    if (currentUser.role === 'lider') {
                        canHear = (u.role === 'imperador');
                    } else {
                        canHear = false;
                    }
                    audioEl.muted = !canHear;
                    return;
                }

                if (activeMafraTargetDivision) {
                    if (currentUser.role === 'imperador') {
                        canHear = (u.division === activeMafraTargetDivision);
                    } else if (u.role === 'imperador') {
                        canHear = (currentUser.division === activeMafraTargetDivision);
                    } else {
                        canHear = (u.division === currentUser.division);
                    }
                    audioEl.muted = !canHear;
                    return;
                }

                if (currentUser.role === 'imperador') {
                    if (u.division === 'purpura') canHear = true;
                    if (u.role === 'lider' && activeLeaderPTTs.has(u.socketId)) canHear = true;
                } 
                else if (currentUser.role === 'lider') {
                    if (u.division === currentUser.division) canHear = true;
                    if (u.role === 'lider' && activeLeaderPTTs.has(u.socketId)) canHear = true;
                    if (u.role === 'imperador') canHear = true;
                } 
                else if (currentUser.role === 'membro') {
                    if (u.division === currentUser.division) canHear = true;
                    if (currentUser.division === 'purpura' && u.role === 'imperador') canHear = true;
                }

                audioEl.muted = !canHear;
            }
        });
    }

    function renderTopology() { 
        const root = document.getElementById('topology-root');
        root.innerHTML = '';
        const mafraUser = systemUsers.find(u => u.role === 'imperador');
        const purpuraUsers = systemUsers.filter(u => u.division === 'purpura' && u.role !== 'imperador' && u.status !== 'kicked');
        const remainingDivisions = ['vermelho', 'amarelo', 'cinza'];

        let purpuraLeftHTML = ''; let purpuraRightHTML = '';
        for (let i = 0; i < 4; i++) { if (purpuraUsers[i]) purpuraLeftHTML += `<div class="tier-membros node-wrapper">${createNodeHTML(purpuraUsers[i])}</div>`; else purpuraLeftHTML += `<div class="tier-membros node-wrapper"><div class="node ghost"><i class="fa-solid fa-user"></i></div><div class="node-name" style="background:transparent; border:none;">VAZIO</div></div>`; }
        for (let i = 4; i < 8; i++) { if (purpuraUsers[i]) purpuraRightHTML += `<div class="tier-membros node-wrapper">${createNodeHTML(purpuraUsers[i])}</div>`; else purpuraRightHTML += `<div class="tier-membros node-wrapper"><div class="node ghost"><i class="fa-solid fa-user"></i></div><div class="node-name" style="background:transparent; border:none;">VAZIO</div></div>`; }

        let focusedPurpura = (activeMafraTargetDivision === 'purpura') ? 'focused-target' : '';

        let html = `<div class="division ${focusedPurpura}" onclick="mafraSelectDivision('purpura')" style="display: flex; align-items: center; justify-content: center; gap: 40px; width: 100%; margin-bottom: 20px;"><div class="div-purpura" style="display: flex; gap: 20px; align-items: center;">${purpuraLeftHTML}</div><div class="tier-mafra node-wrapper">`;
        if (mafraUser) html += createNodeHTML(mafraUser); else html += `<div class="node ghost"><i class="fa-solid fa-crown"></i></div><div class="node-name" style="color:#444; border:none; background:transparent;">TRONO VAZIO</div>`;
        html += `</div><div class="div-purpura" style="display: flex; gap: 20px; align-items: center;">${purpuraRightHTML}</div></div><div class="connector-line" style="height: 30px; background: rgba(255,255,255,0.1);"></div><div class="connector-horizontal" style="width: 70%;"></div><div class="divisions-container">`;

        remainingDivisions.forEach(div => {
            const divUsers = systemUsers.filter(u => u.division === div && u.status !== 'kicked');
            const lider = divUsers.find(u => u.role === 'lider');
            const membros = divUsers.filter(u => u.role === 'membro');
            let focusedClass = (activeMafraTargetDivision === div) ? 'focused-target' : '';

            html += `<div class="division div-${div} ${focusedClass}" onclick="mafraSelectDivision('${div}')" style="width: 33.33%;"><div class="connector-line" style="height: 30px;"></div><div class="tier-lider node-wrapper">`;
            if (lider) html += createNodeHTML(lider); else html += `<div class="node ghost"><i class="fa-solid fa-user-shield"></i></div><div class="node-name" style="background:transparent; border:none;">SEM LÍDER</div>`;
            html += `</div><div class="connector-line" style="height: 30px;"></div><div class="tier-membros grid-membros">`;
            
            let colEsq = ''; let colDir = '';
            membros.forEach((m, index) => {
                const nodeHtml = `<div class="node-wrapper">${createNodeHTML(m)}</div>`;
                if (index % 2 === 0) colEsq += nodeHtml; else colDir += nodeHtml;
            });
            if (membros.length === 0) {
                colEsq = `<div class="node-wrapper"><div class="node ghost"><i class="fa-solid fa-user"></i></div></div>`;
                colDir = `<div class="node-wrapper"><div class="node ghost"><i class="fa-solid fa-user"></i></div></div>`;
            }
            html += `<div class="coluna-esq">${colEsq}</div><div class="coluna-dir">${colDir}</div></div></div>`;
        });
        html += `</div>`; root.innerHTML = html;
        if(isSelfMuted) { const myNode = document.getElementById(`node_${currentUser.id}`); if(myNode) myNode.classList.add('self-muted'); }
        enforceAudioRouting();
    }

    function createNodeHTML(user) { 
        let extraClass = '';
        if (user.status === 'banned') extraClass += ' banned';
        let bg = user.avatar ? `background-image: url('${user.avatar}');` : '';
        let icon = !user.avatar ? '<i class="fa-solid fa-user"></i>' : '';
        if(user.role === 'imperador' && !user.avatar) icon = '<i class="fa-solid fa-crown"></i>';
        if(user.role === 'lider' && !user.avatar) icon = '<i class="fa-solid fa-user-shield"></i>';
        if(user.inCommandRoom) icon += '<i class="fa-solid fa-lock" style="position:absolute; top:-10px; right:-10px; color:var(--amarelo); font-size:1.5rem; text-shadow:0 0 5px #000; z-index:20;"></i>';
        return `<div class="node ${extraClass}" id="node_${user.id}" style="${bg}">${icon}</div><div class="node-name">${user.name}</div>`;
    }

    function renderAdminPanel() { 
        if(currentUser?.role !== 'imperador') return;
        const list = document.getElementById('admin-user-list'); list.innerHTML = '';
        systemUsers.forEach(u => {
            if(u.role === 'imperador') return; 
            const isLider = u.role === 'lider';
            const isBanned = u.status === 'banned';
            list.innerHTML += `
                <div class="user-row">
                    <div class="user-row-header"><span class="user-row-name" style="color: ${divisionColors[u.division]}">${u.name} [${u.division.toUpperCase()}]</span><span style="font-size:0.7rem; color:#888;">${u.role.toUpperCase()}</span></div>
                    <div class="user-actions">
                        <button class="action-btn promote" onclick="admAction('${u.id}', 'role')">${isLider ? 'Rebaixar' : 'Promover a Líder'}</button>
                        <button class="action-btn ban" onclick="admAction('${u.id}', 'ban')">${isBanned ? 'Remover Ban' : 'Banir'}</button>
                        <button class="action-btn" onclick="admAction('${u.id}', 'kick')">Expulsar</button>
                    </div>
                </div>`;
        });
    }

    function admAction(id, action, fromServer) { 
        const user = systemUsers.find(u => u.id === id); if(!user) return;
        if (action === 'role') {
            if (user.role === 'membro') {
                let liderAtual = systemUsers.find(u => u.division === user.division && u.role === 'lider');
                if (liderAtual) { liderAtual.role = 'membro'; if (currentUser && liderAtual.id === currentUser.id) currentUser.role = 'membro'; }
                user.role = 'lider';
            } else { user.role = 'membro'; }
            if (currentUser && user.id === currentUser.id) currentUser.role = user.role;
        } else if (action === 'ban') {
            user.status = user.status === 'banned' ? 'active' : 'banned';
            if (currentUser && user.id === currentUser.id) {
                currentUser.status = user.status;
            }
        } else if (action === 'kick') { user.status = 'kicked'; }
        
        updateHUDButtons(); updateCommsStatusText(); renderAdminPanel(); renderTopology();
        if (fromServer !== 'fromServer') { socket.emit('admin-action-execute', { targetId: id, action: action }); }
    }

    socket.on('kicked-from-network', () => {
        if(localStream) { localStream.getTracks().forEach(track => track.stop()); } 
        document.body.innerHTML = `
            <div style="background-color: black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; font-family: 'Space Mono', monospace; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px;">
                Sua conexão foi cortada!
            </div>
        `;
        setTimeout(() => location.reload(), 3500);
    });

    socket.on('banned-from-network-lock', () => {
        localStorage.setItem('mgi_banned_state', 'true');
        renderBannedScreen();
    });

    socket.on('muted-chat-msg-broadcast', (data) => {
        const container = document.getElementById('chat-messages-container');
        const color = divisionColors[data.senderDivision] || '#fff';
        container.innerHTML += `
            <div class="chat-msg">
                <div class="chat-msg-meta" style="color: ${color}">${data.senderName} [${data.senderDivision.toUpperCase()}]:</div>
                <div>${data.text}</div>
            </div>
        `;
        container.scrollTop = container.scrollHeight;
        
        speakWithRobotVoice(`${data.senderName} disse: ${data.text}`);
    });

    socket.on('mafra-target-division-broadcast', (division) => {
        activeMafraTargetDivision = division;
        updateCommsStatusText();
        renderTopology();
    });

    socket.on('mgi-status-broadcast', (statusString) => {
        currentMGIStatus = statusString;
        aplicarStatusLocal(statusString);
    });

    socket.on('user-command-room-updated', (data) => {
        const targetUser = systemUsers.find(u => u.socketId === data.socketId);
        if(targetUser) {
            targetUser.inCommandRoom = data.inCommandRoom;
            enforceAudioRouting();
            renderTopology();
        }
    });

    socket.on('network-users', (serverUsers, serverState) => {
        serverUsers.forEach(sUser => {
            if (sUser.id !== currentUser.id) {
                let exists = systemUsers.find(u => u.id === sUser.id);
                if (!exists) systemUsers.push(sUser);
                else Object.assign(exists, sUser);
            }
        });
        if (serverState.decentralized !== isDecentralized) toggleDecentralize('fromServer', serverState.decentralized);
        if (serverState.override !== isMafraOverrideActive) { isMafraOverrideActive = serverState.override; enforceAudioRouting(); }
        activeMafraTargetDivision = serverState.mafraTargetDivision || null;
        
        if (serverState.mgiStatus) {
            currentMGIStatus = serverState.mgiStatus;
            const display = document.getElementById('current-status-display');
            display.innerText = serverState.mgiStatus;
            if (serverState.mgiStatus.startsWith('4-0') || serverState.mgiStatus.startsWith('4-1') || serverState.mgiStatus.startsWith('4-2')) {
                display.classList.add('status-danger');
            }
        }

        renderTopology(); renderAdminPanel();

        serverUsers.forEach(sUser => {
            if (sUser.socketId && sUser.socketId !== socket.id) initiatePeerConnection(sUser.socketId, true);
        });
    });

    socket.on('user-joined', (newUser) => { 
        let exists = systemUsers.find(u => u.id === newUser.id);
        if (!exists) systemUsers.push(newUser); else Object.assign(exists, newUser);
        playSystemChime('entry'); 
        renderTopology(); renderAdminPanel();
    });

    socket.on('user-left', (socketId) => { 
        systemUsers = systemUsers.filter(u => u.socketId !== socketId);
        if (peerConnections[socketId]) { peerConnections[socketId].close(); delete peerConnections[socketId]; }
        const audioEl = document.getElementById(`audio_${socketId}`); if(audioEl) audioEl.remove();
        delete remoteCandidatesQueue[socketId];
        playSystemChime('exit'); 
        renderTopology(); renderAdminPanel();
    });

    socket.on('user-voice-state', ({ socketId, isSpeaking }) => { 
        let targetUser = systemUsers.find(u => u.socketId === socketId);
        if (targetUser) {
            const targetNode = document.getElementById(`node_${targetUser.id}`);
            if (targetNode) { if (isSpeaking) targetNode.classList.add('mic-open'); else targetNode.classList.remove('mic-open'); }
        }
    });

    socket.on('leader-ptt-activated', (socketId) => {
        activeLeaderPTTs.add(socketId);
        enforceAudioRouting(); 
    });

    socket.on('leader-ptt-deactivated', (socketId) => {
        activeLeaderPTTs.delete(socketId);
        enforceAudioRouting(); 
    });

    socket.on('mafra-override-activated', () => { isMafraOverrideActive = true; enforceAudioRouting(); updateCommsStatusText(); });
    socket.on('mafra-override-deactivated', () => { isMafraOverrideActive = false; enforceAudioRouting(); updateCommsStatusText(); });

    socket.on('admin-action-broadcast', ({ targetId, action }) => { admAction(targetId, action, 'fromServer'); });
    socket.on('decentralize-network-broadcast', (status) => { if (isDecentralized !== status) toggleDecentralize('fromServer', status); });

    socket.on('webrtc-signal', async ({ from, signal }) => {
        if (!peerConnections[from]) initiatePeerConnection(from, false);
        const pc = peerConnections[from];
        try {
            if (signal.sdp) {
                await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                if (signal.sdp.type === 'offer') {
                    const answer = await pc.createAnswer(); await pc.setLocalDescription(answer);
                    socket.emit('webrtc-signal', { to: from, signal: { sdp: pc.localDescription } });
                }
                if (remoteCandidatesQueue[from]) {
                    while (remoteCandidatesQueue[from].length > 0) {
                        const candidate = remoteCandidatesQueue[from].shift();
                        await pc.addIceCandidate(new RTCIceCandidate(candidate));
                    }
                }
            } else if (signal.candidate) {
                if (pc.remoteDescription && pc.remoteDescription.type) { await pc.addIceCandidate(new RTCIceCandidate(signal.candidate)); } 
                else { if (!remoteCandidatesQueue[from]) remoteCandidatesQueue[from] = []; remoteCandidatesQueue[from].push(signal.candidate); }
            }
        } catch (e) { console.error("Erro na sinalização WebRTC:", e); }
    });

    function initiatePeerConnection(targetSocketId, isOfferor) {
        if (peerConnections[targetSocketId]) return;
        const pc = new RTCPeerConnection(rtcConfig);
        peerConnections[targetSocketId] = pc;

        if (localStream) { localStream.getTracks().forEach(track => pc.addTrack(track, localStream)); }

        pc.onicecandidate = (event) => {
            if (event.candidate) { socket.emit('webrtc-signal', { to: targetSocketId, signal: { candidate: event.candidate } }); }
        };

        pc.ontrack = (event) => {
            let remoteAudio = document.getElementById(`audio_${targetSocketId}`);
            if (!remoteAudio) {
                remoteAudio = document.createElement('audio');
                remoteAudio.id = `audio_${targetSocketId}`;
                remoteAudio.autoplay = true; 
                remoteAudio.playsInline = true; 
                remoteAudio.style.display = 'none'; 
                document.body.appendChild(remoteAudio);
            }
            
            if (remoteAudio.srcObject !== event.streams[0]) {
                remoteAudio.srcObject = event.streams[0];
                
                let playPromise = remoteAudio.play();
                if (playPromise !== undefined) {
                    playPromise.catch(e => {
                        console.warn("[MGI] Esperando interação para iniciar trilha de áudio externa.");
                    });
                }
            }
            
            enforceAudioRouting(); 
        };

        if (isOfferor) {
            pc.onnegotiationneeded = async () => {
                try {
                    const offer = await pc.createOffer();
                    await pc.setLocalDescription(offer);
                    socket.emit('webrtc-signal', { to: targetSocketId, signal: { sdp: pc.localDescription } });
                } catch (e) {
                    console.error("Erro na negociação de canais:", e);
                }
            };
        }
    }
</script>
